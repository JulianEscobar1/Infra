version: '3.8'

services:
  motor:
    build:
      context: ../../motor
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      OMP_NUM_THREADS: "4"
    restart: unless-stopped

  motor-backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENGINE_URL: "http://motor:8080"
      ALLOWED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:3000"
      OMP_NUM_THREADS: "4"
    depends_on:
      - motor
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - motor-backend
    restart: unless-stopped
